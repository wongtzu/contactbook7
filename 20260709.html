    <style>
        * { box-sizing: border-box; }
        body { font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif; background-color: #ffffff; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 98%; max-width: 1400px; display: flex; flex-direction: column; align-items: center; }
        
        .control-bar { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px; padding: 10px; flex-wrap: wrap; }
        .info-tag { font-size: 1.5rem; font-weight: bold; background: #eef2f7; padding: 10px 20px; border-radius: 8px; border: 1px solid #d1d9e6; }
        
        .content-box { background-color: #f4f7fc; border-radius: 12px; padding: 40px; width: 100%; min-height: 400px; display: flex; justify-content: center; align-items: flex-start; }
        
        /* --- 原始設定 --- */
        .main-text-chinese { font-size: 5.8rem; line-height: 1.8; font-weight: 600; color: #000000; white-space: pre-wrap; letter-spacing: 0.05em; }
        .main-text-english { font-size: 4.0rem; line-height: 1.6; font-weight: 600; color: #000000; white-space: pre-wrap; word-break: break-word; }
        .main-text-default { font-size: 3.5rem; line-height: 1.6; font-weight: 600; color: #000000; }
        
        /* --- 星期二設定：無白色框 --- */
        .idiom-layout { width: 100%; }
        .idiom-term { font-size: 5.8rem; font-weight: 900; color: #000; border-bottom: 5px solid #4a90e2; padding-bottom: 15px; margin-bottom: 25px; display: inline-block; }
        .idiom-expl { font-size: 4.0rem; color: #333; line-height: 1.5; font-weight: 600; }

        .wrong-word-container { position: relative; display: inline-block; margin: 0 0.15em; color: #000000; vertical-align: top; }
        .red-circle { position: absolute; top: 54%; left: 48%; transform: translate(-50%, -50%); border: 6px solid #ff0000; border-radius: 50%; width: 1.4em; height: 1.6em; pointer-events: none; box-sizing: border-box; }

        input[type="date"] { font-size: 1.5rem; padding: 8px 10px; border-radius: 8px; border: 1px solid #ccc; cursor: pointer; }
        .btn-today { font-size: 1.4rem; padding: 8px 20px; background-color: #4a90e2; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        @media (max-width: 1024px) {
            .main-text-chinese { font-size: 3.8rem; }
            .main-text-english { font-size: 2.2rem; }
            .main-text-default { font-size: 2.5rem; }
            .red-circle { border-width: 4px; }
        }

        /* 手機版排版調整 */
        @media (max-width: 767px) {
            .control-bar { gap: 8px; }
            .info-tag, input[type="date"], .btn-today { font-size: 1.2rem; padding: 6px 12px; }
            .main-text-chinese { font-size: 2rem; }
            .main-text-english { font-size: 1.3rem; }
            .main-text-default { font-size: 1.5rem; }
            .red-circle { border-width: 3px; }
            .idiom-term { font-size: 2.2rem; margin-bottom: 15px; }
            .idiom-expl { font-size: 1.6rem; }
        }
    </style>
</head>

<div class="container">

function formatToCircle(text) {
    return text.replace(/「(.)」/g, '<span class="wrong-word-container">$1<span class="red-circle"></span></span>');
}


function formatEnglish(text) {
    return text.split("\n").map(line => {

        const match = line.match(/^(.+?)\s(\(.+?\))\s(\/.+?\/)\s(.+)$/);

        if (match) {
            const word = match[1];
            const type = match[2];
            const phonetic = match[3];
            const meaning = match[4];

            return `${word} ${phonetic} ${type} ${meaning}`;
        }

        return line;

    }).join("\n");
}
